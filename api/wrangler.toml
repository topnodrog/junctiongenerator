account_id = "YOUR_ACCOUNT_ID"
name = "jgt-mining-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "jgt-mining"
database_id = "YOUR_DATABASE_ID"

[vars]
API_SECRET = "change-this-to-a-random-secret"
CRON_SECRET = "change-this-to-another-random-secret"

# Cron trigger — runs daily at midnight UTC
[triggers]
crons = ["0 0 * * *"]
